<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    <form id="formLogin" action="/login" method="post" autocomplete="off">
        <input type="email" id="email" name="email" placeholder="Email" required autocomplete="off">
        <input type="password" id="senha" name="senha" placeholder="Senha" required autocomplete="off">
        <button id="btnEntrar" type="submit">Entrar</button>
    </form>

    <p th:if="${erro}" th:text="${erro}"></p>

    <a href="/cadastro">Criar conta</a>

    <script>
        const formLogin = document.getElementById("formLogin");
        const emailInput = document.getElementById("email");
        const senhaInput = document.getElementById("senha");

        function prepararLogin() {
            const emailSalvo = localStorage.getItem("emailUsuario");

            if (emailSalvo) {
                emailInput.value = emailSalvo;
            }

            senhaInput.value = "";

            setTimeout(() => {
                senhaInput.focus();
            }, 150);
        }

        emailInput.addEventListener("input", function () {
            localStorage.setItem("emailUsuario", emailInput.value);
        });

        // força colar SOMENTE o texto puro do clipboard
        senhaInput.addEventListener("paste", function (event) {
            event.preventDefault();

            const textoColado = (event.clipboardData || window.clipboardData).getData("text");
            senhaInput.value = textoColado;
        });

        senhaInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                formLogin.requestSubmit();
            }
        });

        window.addEventListener("load", prepararLogin);

        window.addEventListener("pageshow", function () {
            prepararLogin();
        });
    </script>
</body>
</html>
